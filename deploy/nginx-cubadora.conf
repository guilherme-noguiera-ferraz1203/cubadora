# NGINX — proxy do painel de frota em cubadora.specialcore.com.br
# Copie para /etc/nginx/sites-available/cubadora.specialcore.com.br e ative com um symlink em
# sites-enabled. Depois: sudo nginx -t && sudo systemctl reload nginx
# Para HTTPS: sudo certbot --nginx -d cubadora.specialcore.com.br (ajusta este arquivo sozinho).
#
# SEGURANÇA: o PAINEL e a PUBLICAÇÃO de versões ficam protegidos por senha (quem administra),
# mas os endpoints que os EQUIPAMENTOS usam (heartbeat, download de pacote, consulta de versão)
# ficam ABERTOS — senão os Pis não conseguem reportar nem atualizar.

server {
    listen 80;
    listen [::]:80;
    server_name cubadora.specialcore.com.br;

    client_max_body_size 200m;   # pacotes de versão podem ser grandes

    # --- ABERTO: usado pelos equipamentos ---
    location = /api/heartbeat {
        proxy_pass http://127.0.0.1:9000;
        include /etc/nginx/proxy_params;
    }
    location /api/package/ {
        proxy_pass http://127.0.0.1:9000;
        include /etc/nginx/proxy_params;
    }
    location = /api/versions {
        proxy_pass http://127.0.0.1:9000;
        include /etc/nginx/proxy_params;
    }

    # --- PROTEGIDO: painel + publicar/definir versão (quem administra) ---
    location / {
        proxy_pass http://127.0.0.1:9000;
        include /etc/nginx/proxy_params;

        # RECOMENDADO (acesso público): proteger com usuário/senha.
        # 1) sudo apt-get install -y apache2-utils
        # 2) sudo htpasswd -c /etc/nginx/.htpasswd-cubadora admin
        # 3) descomente as 2 linhas abaixo e recarregue o NGINX:
        # auth_basic "Frota Cubadora";
        # auth_basic_user_file /etc/nginx/.htpasswd-cubadora;
    }
}

# OBS: se o seu NGINX não tiver /etc/nginx/proxy_params, troque cada "include ..." pelas linhas:
#   proxy_http_version 1.1;
#   proxy_set_header Host $host;
#   proxy_set_header X-Real-IP $remote_addr;
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   proxy_read_timeout 120s;
