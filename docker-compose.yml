# Servidor de frota da cubagem.
# Sobe com:  docker compose up -d --build
# Expõe a porta só no localhost da VPS; o NGINX faz o proxy do domínio.
services:
  fleet:
    build: .
    image: cubagem-fleet:latest
    container_name: cubagem-fleet
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"      # acessível só localmente; NGINX faz o proxy público
    volumes:
      - ./fleet-data:/data         # persiste fleet.db + pacotes de versão
      - ./tunnel-keys:/tunnel-keys # authorized_keys compartilhada com cubadora-sshd
    environment:
      - FLEET_PACKAGES=/data/packages
      - TUNNEL_KEYS_PATH=/tunnel-keys/authorized_keys

  cubadora-sshd:
    build: ./deploy/sshd
    image: cubadora-sshd:latest
    container_name: cubadora-sshd
    restart: unless-stopped
    volumes:
      # authorized_keys gerenciado pelo fleet (RO no sshd, RW no fleet)
      - ./tunnel-keys:/tunnel-keys:ro
      # Host keys persistentes (sobrevivem a rebuilds; Pi nao vai dar "host key changed")
      - ./sshd-host-keys:/etc/ssh/host_keys
